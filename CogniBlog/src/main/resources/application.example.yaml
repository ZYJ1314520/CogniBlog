spring:
  application:
    name: CogniBlog

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/cogniblog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: your_db_username
    password: your_db_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1s

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.cogniblog.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# 日志配置
logging:
  level:
    com.example.cogniblog: debug

# DeepSeek AI 配置
deepseek:
  api-url: https://api.deepseek.com/v1/chat/completions
  api-key: your_deepseek_api_key

# JWT 配置
jwt:
  secret: your_jwt_secret_key_change_this!
  expiration: 7200000  # 2小时，单位毫秒
